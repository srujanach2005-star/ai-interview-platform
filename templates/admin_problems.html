<!DOCTYPE html>
<html>
<head>
<title>Admin Problems</title>

<link rel="icon" href="{{ url_for('static', filename='media/logo.jpeg') }}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Added Coding Problems</h2>

<table class="table table-bordered mt-3">

<thead>
<tr>
<th>ID</th>
<th>Title</th>
<th>Description</th>
<th>Action</th>
</tr>
</thead>

<tbody>

{% for p in problems %}
<tr>
<td>{{p[0]}}</td>
<td>{{p[1]}}</td>
<td>{{p[2]}}</td>

<td>
<a href="/delete_problem/{{p[0]}}" class="btn btn-danger btn-sm">Delete</a>
</td>

</tr>
{% endfor %}

</tbody>

</table>

</body>
</html>
