<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SSB Training And Placement Pvt Ltd</title>

<link rel="icon" href="{{ url_for('static', filename='media/logo.jpeg') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#1e3c72,#2a5298);
min-height:100vh;
display:flex;
flex-direction:column;
}

/* NAVBAR */

.navbar{
background:rgba(0,0,0,0.6);
backdrop-filter:blur(8px);
}

.logo{
height:40px;
margin-right:10px;
}

/* MAIN CONTAINER */

.editor-container{
margin:20px;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
flex:1;
}

/* TOP BAR */

.topbar{
background:#f8f9fa;
border-bottom:1px solid #ddd;
padding:10px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* MAIN LAYOUT */

.main{
display:flex;
height:70vh;
}

/* LEFT PANEL */

.left-panel{
width:45%;
background:white;
overflow:auto;
border-right:3px solid #ddd;
}

/* RESIZER */

.resizer{
width:6px;
cursor:col-resize;
background:#ddd;
}

/* RIGHT PANEL */

.right-panel{
flex:1;
display:flex;
flex-direction:column;
}

/* CODE EDITOR */

#editor{
height:40vh;
}

/* TEST CASES */

.testcases{
background:#f8f9fa;
padding:10px;
border-top:1px solid #ddd;
}

.testcase-row{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
}
.testcase-box{
flex:1;
background:white;
padding:10px;
border-radius:6px;
border:1px solid #ddd;
display:flex;
justify-content:space-between;
align-items:center;
}

/* PASS FAIL */
.pass{
color:green;
font-weight:bold;
}

.fail{
color:red;
font-weight:bold;
}
/* OUTPUT */

.output{
background:#1e1e1e;
color:#00ff9c;
padding:10px;
font-family:monospace;
height:100px;
overflow:auto;
}

/* TIMER */

.timer{
font-weight:bold;
color:#e11d48;
}

/* FOOTER */

.footer{
text-align:center;
padding:12px;
background:rgba(0,0,0,0.6);
color:white;
font-size:14px;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark">

<div class="container-fluid">

<a class="navbar-brand d-flex align-items-center">

<img src="{{ url_for('static', filename='media/logo.jpeg') }}" class="logo">

<b>SSB Training And Placement Pvt Ltd</b>

</a>

<a href="/dashboard" class="btn btn-light">Dashboard</a>

</div>

</nav>

<!-- EDITOR -->

<div class="editor-container">

<div class="topbar">

<b>Coding Assessment</b>

<div>

<span class="timer">⏱ Time Left: <span id="time">30:00</span></span>

<select class="form-select form-select-sm d-inline w-auto ms-3">
<option>Python</option>
<option>JavaScript</option>
<option>Java</option>
<option>C++</option>
</select>

<button class="btn btn-success btn-sm ms-2" onclick="runCode()">Run</button>
<button class="btn btn-primary btn-sm" onclick="submitCode()">Submit</button>

</div>

</div>

<div class="main">

<!-- PROBLEM PANEL -->

<div class="left-panel">

<ul class="nav nav-tabs">

<li class="nav-item">
<button class="nav-link active" data-bs-toggle="tab" data-bs-target="#desc">
Description
</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#subs">
Submissions
</button>
</li>

<li class="nav-item">
<button class="nav-link" data-bs-toggle="tab" data-bs-target="#sol">
Solutions
</button>
</li>

</ul>

<div class="tab-content p-3">

<div class="tab-pane fade show active" id="desc">

<h4 id="problem-title"></h4>

<p id="problem-description"></p>


</div>

<div class="tab-pane fade" id="subs">
<p>No submissions yet.</p>
</div>

<div class="tab-pane fade" id="sol">
<p>Solutions will appear after submission.</p>
</div>

</div>

</div>

<div class="resizer" id="drag"></div>

<div class="right-panel">

<div id="editor"></div>

<div class="testcases">

<h6>Test Cases</h6>

<div class="testcase-row">

<div class="testcase-box">
<b>Test Case 1</b>
<span id="t1"></span>
</div>

<div class="testcase-box">
<b>Test Case 2</b>
<span id="t2"></span>
</div>

<div class="testcase-box">
<b>Test Case 3</b>
<span id="t3"></span>
</div>

<div class="testcase-box">
<b>Test Case 4</b>
<span id="t4"></span>
</div>

<div class="testcase-box">
<b>Test Case 5</b>
<span id="t5"></span>
</div>

</div>

</div>

<div class="output" id="output">
Console Output...
</div>

</div>

</div>

</div>

<div class="footer">
© 2026 SSB Training And Placement Pvt Ltd
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* LOAD RANDOM PROBLEM */
fetch("/get_random_problem")
.then(res => res.json())
.then(data => {

window.currentProblem = data.id

document.getElementById("problem-title").innerText = data.title
document.getElementById("problem-description").innerText = data.description

})

/* MONACO EDITOR */

require.config({
paths:{vs:'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs'}
});

let editor;

require(["vs/editor/editor.main"],function(){

editor = monaco.editor.create(document.getElementById('editor'),{

value:`# Write your solution here

def solution():
    pass`,

language:"python",
theme:"vs-dark",
automaticLayout:true

});

});
/* RUN BUTTON */
function runCode(){

let code = editor.getValue()

fetch("/run_code",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
code:code,
problem_id:window.currentProblem
})
})

.then(res=>res.json())
.then(data=>{

document.getElementById("output").innerText = data.console

})

}



// Submitcode
function submitCode(){

let code = editor.getValue()

fetch("/submit_code",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
code:code,
problem_id:window.currentProblem
})
})

.then(res=>res.json())
.then(data=>{

let output = "Code Submitted Successfully\n\n"

for(let i=1;i<=5;i++){

let result = data.results[i-1]

let box = document.getElementById("t"+i)

if(result=="PASS"){
box.innerHTML = "<span class='pass'>PASS</span>"
}else{
box.innerHTML = "<span class='fail'>FAIL</span>"
}

output += "Test Case "+i+" : "+result+"\n"

}

output += "\nTotal Passed: "+data.score+"/5"

document.getElementById("output").innerText = output

})

}

/* TIMER */

let time = 1800;

setInterval(()=>{

time--;

let m = Math.floor(time/60);
let s = time % 60;

document.getElementById("time").innerText =
String(m).padStart(2,'0')+":"+String(s).padStart(2,'0');

},1000);

/* RESIZABLE PANELS */

const resizer=document.getElementById("drag");
const left=document.querySelector(".left-panel");

resizer.addEventListener("mousedown",function(){

document.onmousemove=function(e){
left.style.width=e.clientX+"px";
}

document.onmouseup=function(){
document.onmousemove=null;
}

});

</script>

</body>

</html>
