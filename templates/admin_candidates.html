<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin - Candidates</title>

<link rel="icon" href="{{ url_for('static', filename='media/logo.jpeg') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<style>

body{
margin:0;
font-family:'Segoe UI';
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
}

/* PARTICLES */

#particles-js{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* NAVBAR */

.navbar{
background:rgba(0,0,0,0.6);
}

.logo{
height:40px;
margin-right:10px;
}

/* SIDEBAR */

.sidebar{
min-height:100vh;
background:rgba(0,0,0,0.5);
padding-top:25px;
position:relative;
z-index:1;
}

.sidebar a{
display:block;
color:white;
padding:12px 20px;
text-decoration:none;
border-radius:6px;
margin:6px 10px;
transition:0.3s;
}

.sidebar a:hover{
background:rgba(255,255,255,0.2);
transform:translateX(6px);
}

.sidebar a.active{
background:rgba(255,255,255,0.2);
border-left:4px solid #38BDF8;
}

/* MAIN */

.main-area{
position:relative;
z-index:1;
padding:30px;
}

/* CARD */

.card-box{
background:white;
color:black;
border-radius:12px;
padding:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.3);
margin-bottom:20px;
}

/* FOOTER */

.footer{
text-align:center;
padding:10px;
background:rgba(0,0,0,0.6);
position:fixed;
bottom:0;
width:100%;
}

</style>

</head>

<body>

<div id="particles-js"></div>

<!-- NAVBAR -->

<nav class="navbar navbar-dark">

<div class="container-fluid">

<a class="navbar-brand d-flex align-items-center">

<img src="{{ url_for('static', filename='media/logo.jpeg') }}" class="logo">

<b>SSB Training And Placement Pvt Ltd - Admin</b>

</a>

</div>

</nav>

<div class="container-fluid">

<div class="row">

<!-- SIDEBAR -->

<div class="col-md-2 sidebar">

<h5 class="text-center">⚙ Admin Panel</h5>

<a href="/admin_dashboard">📊 Dashboard</a>

<a class="active" href="/admin_candidates">👥 Candidates</a>

<a href="/admin_coding_judge">💻 Coding Judge</a>

<a href="/admin_results">📈 Coding Results</a>

<a href="/admin_ai_interviews">🤖 AI Interviews</a>

</div>

<!-- MAIN -->

<div class="col-md-10 main-area">

<h2 class="mb-4">Candidates Management</h2>

<!-- ADD CANDIDATE -->

<div class="card-box">

<h4>Add Candidate & Generate Login</h4>

<div class="row">

<div class="col-md-4">
<label>Name</label>
<input id="name" class="form-control">
</div>

<div class="col-md-4">
<label>Email</label>
<input id="email" class="form-control">
</div>

<div class="col-md-4">
<label>Password</label>
<input id="password" class="form-control">
</div>

</div>

<br>

<button class="btn btn-primary" onclick="addCandidate()">Create Login</button>

</div>

<!-- CANDIDATE TABLE -->

<div class="card-box">

<h4>Candidate List</h4>

<table class="table table-striped">

<thead>

<tr>

<th>Name</th>
<th>Email</th>
<th>Password</th>
<th>Status</th>

</tr>

</thead>

<tbody id="candidateTable">

</tbody>

</table>

</div>

</div>

</div>

</div>

<script>

/* ADD CANDIDATE */

function addCandidate(){

let name=document.getElementById("name").value
let email=document.getElementById("email").value
let password=document.getElementById("password").value

let table=document.getElementById("candidateTable")

let row=`
<tr>
<td>${name}</td>
<td>${email}</td>
<td>${password}</td>
<td><span class="badge bg-success">Active</span></td>
</tr>
`

table.innerHTML+=row

document.getElementById("name").value=""
document.getElementById("email").value=""
document.getElementById("password").value=""

}

/* PARTICLES */

particlesJS("particles-js",{

particles:{
number:{value:70},
color:{value:"#ffffff"},
shape:{type:"circle"},
opacity:{value:0.4},
size:{value:3},
line_linked:{
enable:true,
distance:150,
color:"#ffffff",
opacity:0.3,
width:1
},
move:{
enable:true,
speed:2
}
}

})

</script>

<footer class="footer">
© 2026 SSB Training And Placement Pvt Ltd
</footer>

</body>

</html>
